# nfpm config for .deb and .rpm. CI sets VERSION.
name: webtunes-importer
arch: amd64
platform: linux
version: ${VERSION}
section: sound
maintainer: Matteo Bombelli <matteo.bombelli@gmail.com>
description: |
  Import tracks from Spotify, Apple Music, or YouTube into your WebTunes library.
homepage: https://matteob.dev/projects/webtunes
license: MIT
contents:
  - src: ./dist/webtunes-importer
    dst: /opt/webtunes-importer
  - src: /opt/webtunes-importer/webtunes-importer
    dst: /usr/bin/webtunes-importer
    type: symlink
  - src: ./packaging/linux/webtunes-importer.desktop
    dst: /usr/share/applications/webtunes-importer.desktop
  - src: ./packaging/linux/icons/webtunes-importer.png
    dst: /usr/share/icons/hicolor/512x512/apps/webtunes-importer.png
deb:
  fields:
    Recommends: deno
depends:
  - ffmpeg
overrides:
  rpm:
    # Fedora's ffmpeg-free ships /usr/bin/ffmpeg but not a plain "ffmpeg"
    # provide on all releases; recommend instead of hard-requiring so the
    # package installs everywhere (the app warns in-UI when ffmpeg is missing).
    depends: []
    recommends:
      - ffmpeg
